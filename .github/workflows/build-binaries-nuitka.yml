name: Build Binaries (Nuitka)

on:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            arch: x86_64
            runs_on: windows-latest
            artifact_path: dist/nuitka/windows-x86_64/yimo.exe
          - os: macos
            arch: arm64
            runs_on: macos-14
            artifact_path: dist/nuitka/macos-arm64/yimo-macos-arm64.zip
          - os: linux
            arch: x86_64
            runs_on: ubuntu-latest
            artifact_path: dist/nuitka/linux-x86_64/yimo

    runs-on: ${{ matrix.runs_on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf

      - name: Install dependencies
        run: uv sync --locked

      - name: Build (Nuitka)
        run: uv run --with nuitka --with zstandard --with ordered-set python scripts/nuitka/build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yimo-nuitka-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ matrix.artifact_path }}

