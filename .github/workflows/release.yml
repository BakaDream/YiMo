name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.os }}-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            arch: x86_64
            runs_on: windows-latest
            pyinstaller_artifact: dist/pyinstaller/windows-x86_64/yimo.exe
            pyinstaller_out: yimo-pyinstaller-windows-x86_64.exe
            nuitka_artifact: dist/nuitka/windows-x86_64/yimo.exe
            nuitka_out: yimo-nuitka-windows-x86_64.exe
          - os: linux
            arch: x86_64
            runs_on: ubuntu-latest
            pyinstaller_artifact: dist/pyinstaller/linux-x86_64/yimo
            pyinstaller_out: yimo-pyinstaller-linux-x86_64
            nuitka_artifact: dist/nuitka/linux-x86_64/yimo
            nuitka_out: yimo-nuitka-linux-x86_64
          - os: macos
            arch: arm64
            runs_on: macos-14
            pyinstaller_artifact: dist/pyinstaller/macos-arm64/yimo-macos-arm64.zip
            pyinstaller_out: yimo-pyinstaller-macos-arm64.zip
            nuitka_artifact: dist/nuitka/macos-arm64/yimo-macos-arm64.zip
            nuitka_out: yimo-nuitka-macos-arm64.zip

    runs-on: ${{ matrix.runs_on }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf

      - name: Install dependencies
        run: uv sync --locked

      - name: Build (PyInstaller)
        run: uv run --with pyinstaller --with pyinstaller-hooks-contrib python scripts/pyinstaller/build_onefile.py

      - name: Build (Nuitka)
        run: uv run --with nuitka --with zstandard --with ordered-set python scripts/nuitka/build.py

      - name: Collect assets
        run: |
          mkdir -p out
          cp "${{ matrix.pyinstaller_artifact }}" "out/${{ matrix.pyinstaller_out }}"
          cp "${{ matrix.nuitka_artifact }}" "out/${{ matrix.nuitka_out }}"

      - name: Upload build outputs
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.os }}-${{ matrix.arch }}
          path: out/*

  release:
    name: release
    runs-on: ubuntu-latest
    needs: build

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-out
          find release-artifacts -type f -maxdepth 3 -print0 | xargs -0 -I {} cp "{}" release-out/

      - name: Generate SHA256SUMS
        run: |
          python - <<'PY'
          import hashlib
          from pathlib import Path
          files = sorted(Path("release-out").glob("*"))
          lines = []
          for p in files:
              h = hashlib.sha256()
              with p.open("rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              lines.append(f"{h.hexdigest()}  {p.name}")
          Path("release-out/SHA256SUMS.txt").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Generate release notes
        run: |
          python - <<'PY'
          from pathlib import Path
          tag = "${{ github.ref_name }}"
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          header = f"## {tag}"
          if header not in changelog:
              Path("release-notes.md").write_text(f"YiMo {tag}\n", encoding="utf-8")
              raise SystemExit(0)
          start = changelog.index(header)
          rest = changelog[start:]
          # Stop at next version header if present.
          lines = rest.splitlines()
          out = []
          for i, line in enumerate(lines):
              if i != 0 and line.startswith("## "):
                  break
              out.append(line)
          Path("release-notes.md").write_text("\n".join(out).strip() + "\n", encoding="utf-8")
          PY

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: YiMo ${{ github.ref_name }}
          body_path: release-notes.md
          files: release-out/*
